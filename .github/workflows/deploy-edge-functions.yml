# 在 GitHub Linux 上部署 Edge Functions，绕过本机 Docker（如 macOS 上 exit 139）。
# 仓库 Secrets：
#   SUPABASE_ACCESS_TOKEN  Account → Access Tokens（https://supabase.com/dashboard/account/tokens）
#   SUPABASE_PROJECT_REF   项目 ref（与 Project URL 子域名一致，如 qmpkgdlpirzknotugqep）

name: Deploy Edge Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ] || [ -z "${REF}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF in repository secrets."
            exit 1
          fi
          for fn in summarize-article send-news-email-digest email-unsubscribe; do
            echo "=== Deploying ${fn} ==="
            supabase functions deploy "${fn}" --project-ref "${REF}"
          done
